<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Retrato Falado</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">🔍</div>
    <div>
      <div class="brand-title">SISTEMA DE RETRATO FALADO</div>
      <div class="brand-sub">IDENTIFICAÇÃO FACIAL POR COMPOSIÇÃO · UNA 2026.1</div>
    </div>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">COMPONENTES</span>
      <button class="btn btn-ghost btn-sm" onclick="clearSelection()">🧹 Limpar</button>
    </div>
    <div id="sidebar-inner"></div>
  </aside>

  <main class="center">
    <div class="composer">
      <div class="composer-label">RETRATO COMPOSTO</div>

      <div class="face-frame">
        <img id="preview" src="" alt="Retrato falado">
        <div class="face-overlay" id="face-overlay">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="savePortrait()">💾 Salvar</button>
        <button class="btn btn-primary" id="btn-rec" onclick="recognize()">
          🔍 Reconhecer Suspeito
        </button>
      </div>

      <div class="status-line" id="status-bar"></div>
    </div>
  </main>

  <aside class="results-panel" id="results-panel">
    <div class="results-header">
      <span>RESULTADOS — TOP 5</span>
      <button class="close-x" onclick="closeResults()">✕</button>
    </div>
    <div id="results-list"></div>
  </aside>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
